<!DOCTYPE html>
<html lang="en">
<head>
    <!-- High-Visibility Debugging Error Handler -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = 'rgba(255, 0, 0, 0.95)';
            errorDiv.style.color = 'white';
            errorDiv.style.padding = '1.5rem';
            errorDiv.style.zIndex = '999999';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.fontSize = '14px';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
            errorDiv.innerHTML = '<h3 style="margin: 0 0 0.5rem 0; font-size: 16px;">🚨 Frontend Runtime Error Detected</h3>' + 
                                 '<strong>Message:</strong> ' + message + '<br>' +
                                 '<strong>Location:</strong> ' + source + ':' + lineno + ':' + colno + '<br>' +
                                 '<strong>Stack Trace:</strong> ' + (error && error.stack ? error.stack.replace(/\n/g, '<br>') : 'N/A');
            document.body.appendChild(errorDiv);
        };
        window.addEventListener('unhandledrejection', function(event) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = 'rgba(255, 68, 68, 0.95)';
            errorDiv.style.color = 'white';
            errorDiv.style.padding = '1.5rem';
            errorDiv.style.zIndex = '999999';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.fontSize = '14px';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
            errorDiv.innerHTML = '<h3 style="margin: 0 0 0.5rem 0; font-size: 16px;">⚠️ Unhandled Promise Rejection Detected</h3>' + 
                                 '<strong>Reason:</strong> ' + event.reason + '<br>' +
                                 '<strong>Stack Trace:</strong> ' + (event.reason && event.reason.stack ? event.reason.stack.replace(/\n/g, '<br>') : 'N/A');
            document.body.appendChild(errorDiv);
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnX - Academic Management System</title>
    <link rel="stylesheet" href="/style.css">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Premium Liquid Mesh Background Blobs -->
    <div class="bg-blobs-container">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
    </div>

    <div id="app">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" style="display: none;">
            <div class="sidebar-header">
                <div class="logo">
                    <h1>
                        <img src="/learnx_logo.png?v=3" alt="Logo" style="height: 32px; width: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--glass-border); box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-right: 6px;"> 
                        <span>LearnX</span>
                    </h1>
                </div>
                <button id="mobile-menu-close" class="btn-icon mobile-only"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="user-info-sidebar">
                <div class="profile-pic">
                    <i class="fa-solid fa-user-circle"></i>
                </div>
                <div class="profile-details">
                    <span class="name" id="user-display-name">Loading...</span>
                    <span class="role" id="user-display-username">@username</span>
                </div>
                <span class="role-badge" id="user-role-badge">Student</span>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-links" id="nav-links-container">
                    <!-- Nav items dynamically loaded based on roles -->
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-btn btn-secondary w-100" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main View Container -->
        <div class="main-wrapper">
            <header class="mobile-header mobile-only" id="mobile-header" style="display: none;">
                <div class="logo">
                    <h1><img src="/learnx_logo.png?v=3" alt="Logo" style="height: 32px; width: 32px; border-radius: 50%;"> LearnX</h1>
                </div>
                <button id="mobile-menu-btn" class="btn-icon"><i class="fa-solid fa-bars"></i></button>
            </header>
            <main class="main-content" id="main-view-host">
                <!-- Dynamic Views Injected Here -->
            </main>
        </div>
    </div>

    <!-- Global Bug Report FAB -->
    <button id="fab-report-bug" class="glass-panel" style="position: fixed; bottom: 20px; right: 20px; z-index: 99999; width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--accent-blue); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.25s ease;">
        <i class="fa-solid fa-bug" style="font-size: 1.2rem;"></i>
    </button>

    <!-- Bug Report Modal -->
    <div id="modal-bug-report" class="glass-panel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div class="glass-panel" style="background: rgba(17, 33, 45, 0.95); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 1.2rem; color: white;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.8rem;">
                <h3 style="margin: 0; font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; display: flex; align-items: center; gap: 0.5rem; color: var(--accent-blue);">
                    <i class="fa-solid fa-bug"></i> Report a Bug
                </h3>
                <button id="btn-close-bug-modal" style="background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; opacity: 0.7; transition: opacity 0.2s;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="form-bug-report" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <label for="bug-report-title" style="font-size: 0.85rem; font-weight: 600; color: #a5b4fc;">Bug Title *</label>
                    <input type="text" id="bug-report-title" required placeholder="Describe the issue briefly" style="border-radius: 12px; border: 1px solid var(--glass-border); padding: 0.6rem 0.8rem; background: rgba(255,255,255,0.05); color: white; font-size: 0.9rem; width: 100%;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <label for="bug-report-desc" style="font-size: 0.85rem; font-weight: 600; color: #a5b4fc;">Description & Steps to Reproduce *</label>
                    <textarea id="bug-report-desc" required rows="4" placeholder="What goes wrong? How can we reproduce it?" style="border-radius: 12px; border: 1px solid var(--glass-border); padding: 0.6rem 0.8rem; background: rgba(255,255,255,0.05); color: white; font-size: 0.9rem; width: 100%; resize: vertical;"></textarea>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <label for="bug-report-sender" style="font-size: 0.85rem; font-weight: 600; color: #a5b4fc;">Your Name/Email (Optional)</label>
                    <input type="text" id="bug-report-sender" placeholder="e.g. anonymous or your email" style="border-radius: 12px; border: 1px solid var(--glass-border); padding: 0.6rem 0.8rem; background: rgba(255,255,255,0.05); color: white; font-size: 0.9rem; width: 100%;">
                </div>
                <button type="submit" class="btn" style="margin-top: 0.5rem; background: var(--accent-blue); color: white; padding: 0.75rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: transform 0.2s, background 0.2s;">
                    <i class="fa-solid fa-paper-plane"></i> Submit Report
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification Host -->
    <div id="notification-host"></div>

    <!-- Client Application Script -->
    <script src="/app.js?v=2" type="module"></script>
</body>
</html>
